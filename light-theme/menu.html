<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Vetnil App - Menu (Modo Claro)</title>
    <!-- Use Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Tema Claro */
            --bg-1: #ffffff;
            --bg-2: #f8faf9;
            --bg-3: #f0f4f3;

            --bg-color: #e2e8e4;

            --vetnil-dark-green: #14443b;
            --vetnil-green: #00A651;

            --text-primary: #111827;
            --text-secondary: #4b5563;
            --border-color: rgba(0, 0, 0, 0.08);

            --pad: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            background-color: var(--bg-color);
        }

        body {
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: stretch;
            position: relative;
        }

        /* Fundo desfocado simulando a tela de trás (v1.html light) */
        .app-bg {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background: #ffffff;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) scale(0.95);
            transform-origin: top center;
            border-radius: 20px;
            overflow: hidden;
            opacity: 0.6;
            pointer-events: none;
            filter: blur(2px);
            z-index: 1;
        }

        /* Menu Overlay principal */
        .app-menu {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background-color: #ffffff;
            position: relative;
            z-index: 10;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: env(safe-area-inset-top, 40px) var(--pad) 20px;
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
        }

        .close-btn {
            background: var(--bg-3);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            cursor: pointer;
            margin-bottom: 24px;
            transition: background 0.2s;
        }

        .close-btn:active {
            background: #e5e7eb;
        }

        /* Perfil */
        .profile {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 24px var(--pad);
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid #eaeaea;
            background:
                radial-gradient(circle at 30% 35%, rgba(200, 180, 160, .9) 0 22%, transparent 23%),
                radial-gradient(circle at 62% 38%, rgba(210, 190, 170, .9) 0 20%, transparent 21%),
                radial-gradient(circle at 45% 72%, rgba(120, 80, 60, .8) 0 40%, transparent 41%),
                radial-gradient(circle at 50% 55%, var(--vetnil-green) 0 55%, transparent 56%);
            position: relative;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-balance {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-balance svg {
            color: var(--vetnil-green);
        }

        /* Menu Content */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: env(safe-area-inset-bottom, 40px);
            scrollbar-width: none;
        }

        .scrollable-content::-webkit-scrollbar {
            display: none;
        }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 18px var(--pad);
            color: var(--text-primary);
            text-decoration: none;
            transition: background 0.2s;
            position: relative;
            justify-content: space-between;
        }

        .menu-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: var(--pad);
            right: var(--pad);
            height: 1px;
            background-color: var(--border-color);
        }

        .menu-item:last-child::after {
            display: none;
        }

        .menu-item:active {
            background-color: var(--bg-2);
        }

        .menu-item-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-icon {
            width: 24px;
            height: 24px;
            color: var(--vetnil-dark-green);
        }

        .menu-label {
            font-size: 16px;
            font-weight: 600;
        }

        .menu-chevron {
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .menu-divider {
            height: 8px;
            background-color: var(--bg-3);
            margin: 8px 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .logout-item {
            margin-top: auto;
            color: #ef4444;
            /* Vermelho vivo alertativo */
        }

        .logout-item .menu-icon {
            color: #ef4444;
        }
    </style>
</head>
