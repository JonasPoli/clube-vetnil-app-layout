<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Vetnil App - Prêmios</title>
    <style>
        :root {
            --bg-1: #0d3b33;
            --bg-2: #0b2f28;
            --bg-3: #09251f;

            --card: #14443b;
            --stroke: rgba(255, 255, 255, .10);

            --text: #eaf4f1;
            --muted: rgba(234, 244, 241, .72);
            --muted2: rgba(234, 244, 241, .55);

            --shadow: 0 18px 40px rgba(0, 0, 0, .25);
            --radius: 18px;

            --pad: 18px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
            background: radial-gradient(1200px 900px at 50% 0%, #133f37 0%, #071a16 65%, #051311 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: stretch;
        }

        /* App viewport (fits phone) */
        .app {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            background:
                radial-gradient(900px 520px at 50% 10%, rgba(26, 116, 98, .35) 0%, rgba(13, 59, 51, .0) 60%),
                linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
            position: relative;
            overflow: hidden;
        }

        /* complex overlay to match v1 feel */
        .app::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, .16) 0%, rgba(0, 0, 0, .0) 30%, rgba(0, 0, 0, .22) 100%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 16px var(--pad) 28px;
            height: 100%;
            overflow-y: auto;
        }

        /* Status bar */
        .statusbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 2px 6px;
            font-weight: 700;
            letter-spacing: .2px;
            opacity: .95;
            font-size: 18px;
            color: #ffffff;
        }

        .status-right {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 700;
        }

        .signal {
            display: inline-flex;
            gap: 2px;
            align-items: flex-end;
        }

        .signal span {
            width: 3px;
            background: rgba(255, 255, 255, .9);
            display: block;
            border-radius: 2px;
        }

        .signal span:nth-child(1) {
            height: 5px;
            opacity: .55;
        }

        .signal span:nth-child(2) {
            height: 7px;
            opacity: .7;
        }

        .signal span:nth-child(3) {
            height: 9px;
            opacity: .85;
        }

        .signal span:nth-child(4) {
            height: 11px;
        }

        .battery {
            width: 26px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, .85);
            border-radius: 3px;
            position: relative;
        }

        .battery::after {
            content: "";
            position: absolute;
            right: -4px;
            top: 3px;
            width: 3px;
            height: 6px;
            background: rgba(255, 255, 255, .85);
            border-radius: 1px;
        }

        .battery .fill {
            height: 100%;
            width: 72%;
            background: rgba(255, 255, 255, .85);
            border-radius: 1px;
        }

        /* Header V2 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0 24px;
            position: relative;
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            padding: 8px;
            margin-left: -8px;
            cursor: pointer;
        }

        .menu-btn svg {
            width: 28px;
            height: 28px;
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: white;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .notification-btn {
            background: none;
            border: none;
            color: white;
            padding: 8px;
            margin-right: -8px;
            position: relative;
            cursor: pointer;
        }

        .notification-btn svg {
            width: 26px;
            height: 26px;
        }

        .notif-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #ff4757;
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 2px 5px;
            border-radius: 10px;
            border: 2px solid var(--bg-1);
            /* seamless look */
            min-width: 18px;
            text-align: center;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding-bottom: 80px;
            /* space for bottom nav dots if needed */
        }

        .product-card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .product-img {
            aspect-ratio: 1/1;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            display: grid;
            place-items: center;
            position: relative;
        }

        .product-img svg {
            width: 40px;
            height: 40px;
            opacity: 0.5;
            color: white;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 15px;
            font-weight: 600;
            margin: 0 0 4px;
            line-height: 1.3;
            color: rgba(255, 255, 255, 0.95);
        }

        .product-cost {
            font-size: 13px;
            color: #4fd6b4;
            /* vetnil green-ish accent */
            font-weight: 700;
            margin-bottom: 10px;
        }

        .exchange-btn {
            margin-top: auto;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 0;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .exchange-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Sidebar Menu */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(2px);
        }

        .sidebar-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 280px;
            background: #0b2f28;
            /* bg-2 match */
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 24px;
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 40px;
        }

        .close-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 8px;
            cursor: pointer;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .nav-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-link svg {
            width: 24px;
            height: 24px;
        }

        /* bottom subtle page dots (like the screenshot) */
        .pagedots {
            position: absolute;
            left: 50%;
            bottom: max(10px, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            opacity: .35;
            pointer-events: none;
            z-index: 5;
        }

        .pagedots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .65);
        }

        /* maybe on page 2 the second dot is active? */
        .pagedots span:nth-child(2) {
            opacity: .9;
        }
    </style>
</head>

<body>
    <main class="app">
        <!-- Sidebar -->
        <div class="sidebar-overlay" onclick="toggleMenu()"></div>
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="close-btn" onclick="toggleMenu()" aria-label="Fechar menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <nav>
                <a href="#" class="nav-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    Histórico
                </a>
                <a href="#" class="nav-link active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="20 12 20 22 4 22 4 12"></polyline>
                        <rect x="2" y="7" width="20" height="5"></rect>
                        <line x1="12" y1="22" x2="12" y2="7"></line>
                        <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path>
                        <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
                    </svg>
                    Prêmios
                </a>
                <a href="#" class="nav-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                    Pedidos
                </a>
            </nav>
        </aside>

        <div class="content">
            <!-- Status bar -->
            <div class="statusbar" aria-hidden="true">
                <div>10:15 AM</div>
                <div class="status-right">
                    <div class="signal">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <div style="font-size:14px; margin-left:6px;">5G</div>
                    <div class="battery">
                        <div class="fill"></div>
                    </div>
                </div>
            </div>

            <!-- Header -->
            <header class="header">
                <button class="menu-btn" onclick="toggleMenu()" aria-label="Abrir menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>

                <h1 class="page-title">Loja de Prêmios</h1>

                <button class="notification-btn" aria-label="Notificações">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span class="notif-badge">3</span>
                </button>
            </header>

            <!-- Product Grid -->
            <div class="products-grid">
                <!-- Product 1 -->
                <div class="product-card">
                    <div class="product-img">
                        <!-- Backpack icon placeholder -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2z"></path>
                            <path d="M16 2v4"></path>
                            <path d="M8 2v4"></path>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">Mochila Vetnil Pro</h3>
                        <div class="product-cost">1200 Vetcoins</div>
                        <button class="exchange-btn">Trocar</button>
                    </div>
                </div>

                <!-- Product 2 -->
                <div class="product-card">
                    <div class="product-img">
                        <!-- thermos icon placeholder -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M15 2H9a1 1 0 0 0-1 1v2c0 .6.4 1 1 1h6c.6 0 1-.4 1-1V3a1 1 0 0 0-1-1z"></path>
                            <path d="M8 6h8v12a4 4 0 0 1-4 4 4 4 0 0 1-4-4V6z"></path>
                            <line x1="18" y1="6" x2="6" y2="6"></line>
                        </svg>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">Garrafa Térmica</h3>
                        <div class="product-cost">800 Vetcoins</div>
                        <button class="exchange-btn">Trocar</button>
                    </div>
                </div>

                <!-- Product 3 -->
                <div class="product-card">
                    <div class="product-img">
                        <!-- cap icon placeholder -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <ellipse cx="12" cy="12" rx="10" ry="6"></ellipse>
                        </svg>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">Boné Exclusivo</h3>
                        <div class="product-cost">400 Vetcoins</div>
                        <button class="exchange-btn">Trocar</button>
                    </div>
                </div>

                <!-- Product 4 -->
                <div class="product-card">
                    <div class="product-img">
                        <!-- battery icon placeholder for powerbank -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="2" y="7" width="16" height="10" rx="2" ry="2"></rect>
                            <line x1="22" y1="11" x2="22" y2="13"></line>
                        </svg>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">Power Bank</h3>
                        <div class="product-cost">950 Vetcoins</div>
                        <button class="exchange-btn">Trocar</button>
                    </div>
                </div>

                <!-- Product 5 -->
                <div class="product-card">
                    <div class="product-img">
                        <!-- T-shirt -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path
                                d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z">
                            </path>
                        </svg>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">Camiseta Polo</h3>
                        <div class="product-cost">600 Vetcoins</div>
                        <button class="exchange-btn">Trocar</button>
                    </div>
                </div>

                <!-- Product 6 -->
                <div class="product-card">
                    <div class="product-img">
                        <!-- Notebook -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">Caderno de Anotações</h3>
                        <div class="product-cost">250 Vetcoins</div>
                        <button class="exchange-btn">Trocar</button>
                    </div>
                </div>
            </div>

        </div>

        <div class="pagedots" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
        </div>
    </main>

    <script>
        function toggleMenu() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        }

        async function loadGifts() {
            const grid = document.querySelector('.products-grid');
            try {
                // Usando https para evitar problemas de mixed-content, já que a API suporta
                const response = await fetch('https://api.clubevetnil.com.br/api/gifts');
                if (!response.ok) throw new Error('Network response was not ok');
                const gifts = await response.json();

                grid.innerHTML = ''; // Limpar placeholders

                gifts.forEach(gift => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <div class="product-img">
                            <img src="${gift.picture}" alt="${gift.name}">
                        </div>
                        <div class="product-info">
                            <h3 class="product-name">${gift.name}</h3>
                            <div class="product-cost">${gift.points} Vetcoins</div>
                            <button class="exchange-btn">Trocar</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Erro ao buscar os prêmios:', error);
                grid.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; padding: 20px;">Erro ao carregar os prêmios. Tente novamente mais tarde.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadGifts);
    </script>
</body>

</html>
