<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos - Clube Vetnil</title>
    <!-- Use Google Fonts (Inter) for a clean look like Nubank -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cores padrão do aplicativo (v1.html) */
            --bg-1: #0d3b33;
            --bg-2: #0b2f28;
            --bg-3: #09251f;

            --vetnil-green: #14443b;
            /* Ajustado para harmonizar com v1.html */
            --vetnil-dark-green: #0d3b33;
            --vetnil-bright: #00A651;

            /* Ajustes para o novo tema mais dark */
            --bg-color: #051311;
            --card-bg: rgba(255, 255, 255, .07);
            /* Igual a .card do v1 */
            --text-primary: #eaf4f1;
            --text-secondary: rgba(234, 244, 241, .72);
            --border-color: rgba(255, 255, 255, .10);

            --shadow: 0 18px 40px rgba(0, 0, 0, .25);

            /* Status Colors */
            --status-pending: #f59e0b;
            --status-sended: #3b82f6;
            --status-delivered: #10b981;
            --status-canceled: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(900px 520px at 50% 10%, rgba(26, 116, 98, .35) 0%, rgba(13, 59, 51, .0) 60%),
                linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .app-container {
            width: 100%;
            max-width: 430px;
            /* Mobile first, Nubank style app layout */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: transparent;
        }

        /* Header / App Bar */
        .app-header {
            padding: 24px 24px 16px 24px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(13, 59, 51, 0.85);
            /* rgba value of --bg-1 */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 10;
            border-bottom: 1px solid var(--border-color);
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-left: -8px;
            /* Offset button padding */
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            margin-left: 12px;
        }

        /* Main Content */
        .content {
            padding: 24px 16px;
            flex-grow: 1;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Order List */
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .order-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            display: block;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, background 0.2s;
            position: relative;
            overflow: hidden;
        }

        .order-card:active {
            transform: scale(0.98);
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Decorative left border for status */
        .status-indicator {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 12px;
        }

        .product-info-top {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .icon-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-circle svg {
            width: 24px;
            height: 24px;
            color: var(--text-primary);
        }

        .product-title {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .order-date {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .order-cost {
            text-align: right;
            flex-shrink: 0;
        }

        .vetcoins-amount {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: baseline;
            gap: 4px;
            justify-content: flex-end;
        }

        .vetcoins-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--vetnil-bright);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            margin-top: 6px;
        }

        /* Badge status variations */
        .status-badge.pending {
            background-color: rgba(245, 158, 11, 0.15);
            color: var(--status-pending);
        }

        .status-badge.sended {
            background-color: rgba(59, 130, 246, 0.15);
            color: var(--status-sended);
        }

        .status-badge.delivered {
            background-color: rgba(16, 185, 129, 0.15);
            color: #34d399;
            /* lighter green for dark bg */
        }

        .status-badge.canceled {
            background-color: rgba(239, 68, 68, 0.15);
            color: #f87171;
            /* lighter red for dark bg */
        }


        .order-details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-top: 16px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .detail-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 15px;
            line-height: 1.5;
        }

        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
            color: transparent;
        }

        @keyframes loading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <!-- Header -->
        <div class="app-header">
            <button class="back-btn" aria-label="Voltar" onclick="window.history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <h1 class="header-title">Meus Pedidos</h1>
        </div>

        <!-- Main Content -->
        <main class="content">
            <div class="section-header">
                <h2 class="section-title">Histórico</h2>
            </div>

            <!-- Where orders will be mounted -->
            <div id="orders-container" class="order-list">

                <!-- Skeleton UI that shows while JS loads -->
                <div class="order-card skeleton" style="min-height: 160px;">Loading</div>
                <div class="order-card skeleton" style="min-height: 160px; opacity: 0.7;">Loading</div>
                <div class="order-card skeleton" style="min-height: 160px; opacity: 0.4;">Loading</div>

            </div>
        </main>
    </div>

    <script>
        // Constants from PHP
        const STATUS_PENDING = 1;
        const STATUS_SENDED = 2;
        const STATUS_CANCELED = 3;
        const STATUS_DELIVERED = 4;

        // Status Dictionary
        const statusConfig = {
            [STATUS_PENDING]: { label: 'Em processamento', className: 'pending', color: 'var(--status-pending)' },
            [STATUS_SENDED]: { label: 'Enviado', className: 'sended', color: 'var(--status-sended)' },
            [STATUS_DELIVERED]: { label: 'Entregue', className: 'delivered', color: 'var(--status-delivered)' },
            [STATUS_CANCELED]: { label: 'Cancelado', className: 'canceled', color: 'var(--status-canceled)' }
        };

        // Format Date (DD MMM YYYY)
        const formatDate = (dateString) => {
            const options = { day: '2-digit', month: 'short', year: 'numeric' };
            const date = new Date(dateString);
            return date.toLocaleDateString('pt-BR', options).replace('.', '');
        };

        // Format Currency/Points
        const formatPoints = (points) => {
            return points.toLocaleString('pt-BR');
        };

        // Mock Data using Nubank's approach: recent on top, grouped logically
        const mockOrders = [
            {
                id: 'VD-839210',
                productName: 'Fonte Bebedouro para Gatos Vetmax Plus',
                sku: '0008',
                points: 5200,
                status: STATUS_PENDING,
                date: '2026-02-23T10:30:00',
                qty: 1
            },
            {
                id: 'VD-839044',
                productName: 'Copo "Menos 01 Lixo"',
                sku: '0023',
                points: 1500, // 500 * 3
                status: STATUS_SENDED,
                date: '2026-02-20T14:15:00',
                qty: 3
            },
            {
                id: 'VD-821001',
                productName: 'Necessaire Vetnil',
                sku: '0001',
                points: 750,
                status: STATUS_DELIVERED,
                date: '2026-01-15T09:45:00',
                qty: 1
            },
            {
                id: 'VD-810992',
                productName: 'Kit Queijos 03 Peças',
                sku: '0021',
                points: 3000,
                status: STATUS_CANCELED,
                date: '2025-11-05T16:20:00',
                qty: 1
            }
        ];

        // Generate Order HTML
        const createOrderCard = (order) => {
            const statusInfo = statusConfig[order.status] || { label: 'Desconhecido', className: '', color: '#ccc' };
            const formattedDate = formatDate(order.date);
            const formattedPoints = formatPoints(order.points);

            return `
                <a href="#" class="order-card">
                    <div class="status-indicator" style="background-color: ${statusInfo.color}"></div>
                    
                    <div class="order-header">
                        <div class="product-info-top">
                            <div class="icon-circle">
                                <!-- Box Icon -->
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="21 8 21 21 3 21 3 8"></polyline>
                                    <rect x="1" y="3" width="22" height="5"></rect>
                                    <line x1="10" y1="12" x2="14" y2="12"></line>
                                </svg>
                            </div>
                            <div>
                                <h3 class="product-title" title="${order.productName}">${order.productName}</h3>
                                <div class="order-date">${formattedDate}</div>
                            </div>
                        </div>
                        
                        <div class="order-cost">
                            <div class="vetcoins-amount">
                                -${formattedPoints}
                            </div>
                            <div class="vetcoins-label">vetcoins</div>
                        </div>
                    </div>

                    <div class="order-details-grid">
                        <div class="detail-item">
                            <span class="detail-label">Cod. do Pedido</span>
                            <span class="detail-value">${order.id}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Status</span>
                            <span class="status-badge ${statusInfo.className}">
                                <span style="display:inline-block; width:6px; height:6px; background-color:currentColor; border-radius:50%; margin-right:6px;"></span>
                                ${statusInfo.label}
                            </span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">SKU (Ref)</span>
                            <span class="detail-value">${order.sku}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Quantidade</span>
                            <span class="detail-value">${order.qty}x</span>
                        </div>
                    </div>
                </a>
            `;
        };

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('orders-container');

            // Simulate API Request delay
            setTimeout(() => {
                if (mockOrders.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="8" x2="12" y2="12"></line>
                                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                                </svg>
                            </div>
                            <h3 class="empty-title">Nenhum pedido</h3>
                            <p class="empty-desc">Você ainda não realizou nenhum resgate de prêmios.</p>
                        </div>
                    `;
                    return;
                }

                const html = mockOrders.map(createOrderCard).join('');
                container.innerHTML = html;
            }, 600); // 600ms artificial delay to show skeletons
        });
    </script>
</body>

</html>
