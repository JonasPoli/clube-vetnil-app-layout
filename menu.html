<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Vetnil App - Menu</title>
    <!-- Use Google Fonts (Inter) for a clean look like Nubank -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Core colors mixed between Vetnil dark and Nubank style */
            --bg-1: #0d3b33;
            --bg-2: #0b2f28;
            --bg-3: #09251f;

            --bg-color: #051311;
            --card: rgba(255, 255, 255, .07);

            --text-primary: #eaf4f1;
            --text-secondary: rgba(234, 244, 241, .72);
            --border-color: rgba(255, 255, 255, .10);

            --pad: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            background-color: var(--bg-color);
        }

        body {
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: stretch;
            /* NuBank menu opened effect: The background is slightly darker/zoomed out, but we simulate it by rendering the menu on top */
            position: relative;
        }

        /* 
         * Background Layer (Simulating v1.html in the background) 
         */
        .app-bg {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background:
                radial-gradient(900px 520px at 50% 10%, rgba(26, 116, 98, .35) 0%, rgba(13, 59, 51, .0) 60%),
                linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) scale(0.95);
            /* NuBank push back effect */
            transform-origin: top center;
            border-radius: 20px;
            overflow: hidden;
            opacity: 0.5;
            /* Dim the background to focus on menu */
            pointer-events: none;
            filter: blur(2px);
            z-index: 1;
        }

        /* 
         * Menu Overlay (The actual content) 
         */
        .app-menu {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background-color: var(--bg-1);
            /* Solid dark vetnil green mimicking Nubank purple menu */
            position: relative;
            z-index: 10;
            transform: translateY(0);
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header / App Bar */
        .header {
            padding: env(safe-area-inset-top, 40px) var(--pad) 20px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.2) 0%, transparent 100%);
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            cursor: pointer;
            margin-bottom: 24px;
        }

        /* User Profile Area */
        .profile {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            padding: 0 var(--pad);
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, .25);
            background:
                radial-gradient(circle at 30% 35%, rgba(255, 240, 220, .95) 0 22%, transparent 23%),
                radial-gradient(circle at 62% 38%, rgba(255, 235, 210, .9) 0 20%, transparent 21%),
                radial-gradient(circle at 45% 72%, rgba(60, 25, 15, .55) 0 40%, transparent 41%),
                radial-gradient(circle at 50% 55%, rgba(35, 90, 70, .45) 0 55%, transparent 56%);
            position: relative;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-balance {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-balance svg {
            color: #00A651;
            /* Vetnil bright */
        }

        /* Menu Items List */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: env(safe-area-inset-bottom, 40px);
            scrollbar-width: none;
            /* Firefox */
        }

        .scrollable-content::-webkit-scrollbar {
            display: none;
            /* Safari/Chrome */
        }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 16px var(--pad);
            color: var(--text-primary);
            text-decoration: none;
            transition: background 0.2s;
            position: relative;
            justify-content: space-between;
        }

        .menu-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: var(--pad);
            right: var(--pad);
            height: 1px;
            background-color: var(--border-color);
        }

        .menu-item:last-child::after {
            display: none;
        }

        .menu-item:active {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .menu-item-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-icon {
            width: 24px;
            height: 24px;
            color: var(--text-secondary);
            opacity: 0.9;
        }

        .menu-label {
            font-size: 16px;
            font-weight: 500;
        }

        .menu-chevron {
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* Group Separator */
        .menu-divider {
            height: 8px;
            background-color: rgba(0, 0, 0, 0.15);
            margin: 8px 0;
        }

        .logout-item {
            border-top: 1px solid var(--border-color);
            margin-top: auto;
            color: #fca5a5;
            /* Lighter red */
        }

        .logout-item .menu-icon {
            color: #fca5a5;
            opacity: 1;
        }
    </style>
</head>

<body>
